<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>To Do List</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="theme-color" content="#0B1F3B">

<style>
:root{
  --navy:#0B1F3B;
  --gold:#C8A24A;
  --paper:#FBFAF6;
  --card:#ffffff;
  --ink:#101216;
  --muted:#5c6470;
  --green:#1F7A4C;
  --radius:14px;
}

/* RESET */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,ui-rounded,sans-serif;
  background:var(--paper);
  color:var(--ink);
}

/* HEADER */
header{
  background:linear-gradient(180deg,#0B1F3B,#07162A);
  color:white;
  padding:16px;
  border-bottom:2px solid var(--gold);
}
h1{
  margin:0;
  font-size:26px;
  font-weight:900;
}
.tabs{
  margin-top:12px;
  display:flex;
  gap:8px;
}
.tab{
  padding:10px 14px;
  border-radius:999px;
  border:1px solid var(--gold);
  background:transparent;
  color:white;
  font-weight:800;
  cursor:pointer;
}
.tab.active{
  background:var(--gold);
  color:#07162A;
}

/* LAYOUT */
main{
  max-width:900px;
  margin:auto;
  padding:16px 12px 90px;
}
.card{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid rgba(0,0,0,.1);
  padding:16px;
  margin-bottom:12px;
}

/* FORM */
.field{
  margin-bottom:12px;
}
.field label{
  font-size:12px;
  font-weight:700;
  display:block;
  margin-bottom:4px;
}
input, select, textarea{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:15px;
}
textarea{min-height:80px}

.actions{
  display:flex;
  gap:10px;
}
.btn{
  padding:12px 16px;
  border-radius:999px;
  border:none;
  font-weight:800;
  cursor:pointer;
}
.btn.main{
  background:var(--gold);
}
.btn.ghost{
  background:transparent;
  border:1px solid #aaa;
}

/* INLINE RÉUNION */
.meeting-inline{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border:1px solid var(--green);
  border-radius:10px;
}
.meeting-inline input{
  width:20px;
  height:20px;
}

/* LISTE */
ul{list-style:none;padding:0;margin:0}
.item{
  display:grid;
  grid-template-columns:36px 1fr 100px 36px;
  gap:8px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:8px;
}
.item.meeting{
  background:rgba(31,122,76,.08);
}
.item .status{
  width:100px;
}

/* ARCHIVES */
.archive{
  background:
    linear-gradient(180deg,#F4E7C9,#EAD7B1);
  border:1px solid #b79c6a;
}

/* MODAL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  align-items:flex-start;
  justify-content:center;
  padding:12px;
}
.overlay.open{display:flex}
.modal{
  width:100%;
  max-width:720px;
  max-height:calc(100vh - 24px);
  background:white;
  border-radius:16px;
  overflow:hidden;
}
.modal header{
  background:#07162A;
  color:white;
  padding:12px;
}
.modal .body{
  padding:14px;
  max-height:calc(100vh - 120px);
  overflow:auto;
}

/* FOOTER */
footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fafafa;
  border-top:1px solid #ddd;
  padding:8px;
  display:flex;
  justify-content:center;
  gap:10px;
}
</style>
</head>

<body>

<header>
  <h1>To Do List</h1>
  <div class="tabs">
    <button class="tab active" id="tTodo">À faire</button>
    <button class="tab" id="tArch">Archives</button>
    <button class="tab" id="tStats">Statistiques</button>
  </div>
</header>

<main>

<section id="todo">
  <div class="card">
    <form id="addForm">
      <div class="field">
        <label>Action</label>
        <input id="action">
      </div>

      <div class="field">
        <label>Statut</label>
        <select id="statut">
          <option>A faire</option>
          <option>En cours</option>
          <option>Terminé</option>
        </select>
      </div>

      <div class="field">
        <label>Réunion</label>
        <div class="meeting-inline">
          <input type="checkbox" id="meetingToggle">
          <strong>Réunion</strong>
        </div>
      </div>

      <div class="actions">
        <button class="btn main">Ajouter</button>
        <button type="reset" class="btn ghost">Vider</button>
      </div>
    </form>
  </div>

  <div class="card">
    <ul id="list"></ul>
  </div>
</section>

<section id="archives" hidden>
  <div class="card archive">
    <ul id="archList"></ul>
  </div>
</section>

<section id="stats" hidden>
  <div class="card">
    <p>Statistiques (courbes à venir)</p>
  </div>
</section>

</main>

<footer>
  <button class="btn ghost">Exporter</button>
</footer>

<!-- MODAL RÉUNION -->
<div class="overlay" id="meetingModal">
  <div class="modal">
    <header>
      <strong>Réunion</strong>
    </header>
    <div class="body">
      <div class="field"><label>Date</label><input type="date"></div>
      <div class="field"><label>Heure</label><input type="time"></div>
      <div class="field"><label>Lieu</label><input></div>
      <div class="field"><label>Invités</label><input></div>
      <div class="actions">
        <button class="btn main">Créer</button>
        <button class="btn ghost" id="closeMeeting">Annuler</button>
      </div>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);

$("meetingToggle").addEventListener("change",e=>{
  if(e.target.checked){
    $("meetingModal").classList.add("open");
  }
});

$("closeMeeting").addEventListener("click",()=>{
  $("meetingModal").classList.remove("open");
  $("meetingToggle").checked=false;
});
</script>

<script>
if("serviceWorker"in navigator){
 navigator.serviceWorker.register("./sw.js?v=2026-04-22");
}
</script>

</body>
</html>
