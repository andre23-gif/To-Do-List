<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To Do List</title>

  <!-- PWA (chemins relatifs OK pour GitHub Pages en /To-Do-List/) -->
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="theme-color" content="#0B1F3B">

  <style>
    /* =======================
       THEME ART DÉCO (bleu nuit + doré)
       ======================= */
    :root{
      --navy:#0B1F3B;
      --navy2:#07162A;
      --gold:#C8A24A;
      --gold2:#E2C978;
      --ink:#121316;
      --paper:#FBFAF6;
      --ivory:#FFFDF7;
      --shadow: 0 18px 40px rgba(0,0,0,.14);
      --radius: 14px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background: radial-gradient(1200px 600px at 50% -200px, rgba(200,162,74,.18), transparent 55%),
                  linear-gradient(180deg, rgba(11,31,59,.10), transparent 35%),
                  var(--paper);
      color:var(--ink);
      font-family: ui-rounded, system-ui, -apple-system, sans-serif;
    }

    /* =======================
       HEADER + GROS BOUTONS
       ======================= */
    header{
      padding:18px 14px 10px;
      background:
        linear-gradient(180deg, rgba(11,31,59,.92), rgba(7,22,42,.92));
      color: #fff;
      border-bottom: 3px solid rgba(200,162,74,.55);
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }
    .wrap{ max-width: 980px; margin:0 auto; }
    .title{
      margin:0;
      font-weight: 800;
      letter-spacing:.6px;
      font-size: 28px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .title-badge{
      width:34px;height:34px;
      border-radius:10px;
      background: linear-gradient(135deg, rgba(200,162,74,.95), rgba(226,201,120,.95));
      display:inline-flex;
      align-items:center;justify-content:center;
      color: var(--navy);
      font-weight: 900;
      box-shadow: inset 0 0 0 2px rgba(7,22,42,.18);
    }

    .tabs{
      margin-top:14px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .tab{
      border: 2px solid rgba(200,162,74,.75);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      color:#fff;
      padding:14px 18px;             /* plus grands */
      border-radius: 999px;
      font-size:16px;
      font-weight:700;
      letter-spacing:.2px;
      cursor:pointer;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.08);
    }
    .tab.active{
      background: linear-gradient(135deg, rgba(200,162,74,.96), rgba(226,201,120,.96));
      color: var(--navy2);
      border-color: rgba(226,201,120,.9);
    }

    /* =======================
       LAYOUT
       ======================= */
    main{
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 10px 92px;
    }
    .panel{ margin-top: 12px; }

    /* =======================
       CADRES ART DÉCO (pur CSS)
       Inspiré des techniques "art deco border" (outline + conic-gradient)
       ======================= */
    .deco-frame{
      --c: var(--gold);
      --b: 2px;     /* épaisseur lignes */
      --o1: 16px;   /* marge cadre */
      --o2: 10px;   /* offset rectangle interne */
      position: relative;
      border: var(--o1) solid transparent;
      border-radius: var(--radius);
      outline: var(--b) solid var(--c);
      outline-offset: calc(-1 * var(--o2));
      background:
        conic-gradient(from 90deg at var(--b) var(--b),
          transparent 25%,
          rgba(200,162,74,.95) 0) 0 0 /
        calc(100% - var(--b)) calc(100% - var(--b))
        padding-box border-box;
      background-color: rgba(255,255,255,.86);
      box-shadow: var(--shadow);
      overflow: hidden;
    } /* [3](https://stackoverflow.com/questions/65758024/art-deco-style-border-in-css)[4](https://codepen.io/angelagiese/pen/mdMBYaM) */

    .card-inner{
      padding: 16px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.80));
    }

    /* =======================
       FORMULAIRE (To Do)
       ======================= */
    .grid{
      display:grid;
      gap:12px;
      grid-template-columns: repeat(2, minmax(0,1fr));
    }
    @media (max-width: 760px){
      .grid{ grid-template-columns: 1fr; }
    }
    label span{
      display:block;
      font-size:12px;
      opacity:.78;
      margin:0 0 6px;
      color: rgba(11,31,59,.88);
      font-weight: 700;
      letter-spacing: .2px;
    }
    input, select{
      width:100%;
      padding:12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(7,22,42,.18);
      background: rgba(255,255,255,.98);
      font:inherit;
      outline:none;
    }
    input:focus, select:focus{
      border-color: rgba(200,162,74,.9);
      box-shadow: 0 0 0 4px rgba(200,162,74,.18);
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }
    .btn{
      border:0;
      padding:12px 16px;
      border-radius: 999px;
      cursor:pointer;
      font:inherit;
      font-weight: 800;
      letter-spacing:.2px;
    }
    .btn.primary{
      background: linear-gradient(135deg, rgba(200,162,74,.96), rgba(226,201,120,.96));
      color: var(--navy2);
      border: 2px solid rgba(7,22,42,.12);
      box-shadow: 0 10px 22px rgba(0,0,0,.16);
    }
    .btn.ghost{
      background: transparent;
      border: 2px solid rgba(11,31,59,.28);
      color: var(--navy2);
    }

    /* =======================
       LISTES
       ======================= */
    .list-header{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      margin-bottom: 10px;
    }
    .list-title{
      margin:0;
      font-size:18px;
      letter-spacing:.2px;
      color: var(--navy2);
    }
    ul{
      list-style:none;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .item{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:12px;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(11,31,59,.05), rgba(200,162,74,.06));
      border: 1px solid rgba(7,22,42,.10);
    }
    .main{ flex:1; }
    .line{
      font-weight: 900;
      font-size: 16px;
      color: var(--navy2);
    }
    .meta{
      font-size:12px;
      opacity:.82;
      margin-top:4px;
      color: rgba(7,22,42,.82);
    }

    .icon-btn{
      width:46px;
      height:46px;
      border-radius: 50%;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      font-size: 20px;
      border: 2px solid rgba(200,162,74,.75);
      background: linear-gradient(135deg, rgba(200,162,74,.96), rgba(226,201,120,.96));
      color: var(--navy2);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.18);
    }
    .icon-btn.trash{
      background: rgba(255,255,255,.92);
      color: rgba(7,22,42,.88);
      border: 1px solid rgba(7,22,42,.16);
      font-size: 18px;
    }
    .icon-btn.back{
      background: rgba(255,255,255,.92);
      color: rgba(11,31,59,.92);
      border: 2px solid rgba(200,162,74,.55);
      font-size: 18px;
    }

    /* =======================
       ARCHIVES : vieux papier + vieux classeur
       ======================= */
    .archive-wrapper{
      position: relative;
      padding-left: 18px; /* place pour le "dos de classeur" */
    }

    .archive-frame{
      --c: rgba(123,95,42,.55);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      background:
        radial-gradient(700px 400px at 40% 0%, rgba(255,255,255,.35), transparent 60%),
        radial-gradient(900px 600px at 70% 40%, rgba(0,0,0,.06), transparent 65%),
        /* "fibres papier" */
        repeating-linear-gradient(0deg, rgba(0,0,0,.02) 0 2px, rgba(255,255,255,.00) 2px 6px),
        linear-gradient(180deg, #F4E7C9, #EAD7B1);
      border: 2px solid rgba(123,95,42,.45);
      position: relative;
    }

    /* dos de classeur */
    .archive-frame::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width: 20px;
      background: linear-gradient(180deg, rgba(123,95,42,.55), rgba(123,95,42,.25));
      border-right: 2px solid rgba(0,0,0,.12);
      box-shadow: inset -6px 0 10px rgba(0,0,0,.12);
    }

    .archive-inner{
      padding: 16px;
      padding-left: 24px;
    }

    .archive-item{
      background: rgba(255,255,255,.40);
      border: 1px dashed rgba(0,0,0,.28);
      font-family: "American Typewriter", ui-monospace, Menlo, Monaco, "Courier New", monospace;
    }
    .stamp{
      font-size:12px;
      opacity:.8;
      color: rgba(123,95,42,.95);
      margin-top:6px;
    }

    /* =======================
       FOOTER
       ======================= */
    footer{
      position:fixed;
      left:0; right:0; bottom:0;
      display:flex;
      gap:10px;
      justify-content:center;
      padding:10px;
      background: rgba(251,250,246,.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(0,0,0,.08);
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <h1 class="title">
        <span class="title-badge">✓</span>
        To Do List
      </h1>

      <div class="tabs" role="tablist" aria-label="Onglets">
        <button id="tab-todo" class="tab active" type="button" role="tab">À faire</button>
        <button id="tab-archive" class="tab" type="button" role="tab">Archives</button>
      </div>
    </div>
  </header>

  <main>
    <!-- ONGLET TODO -->
    <section id="todo-section" class="panel">
      <div class="deco-frame">
        <div class="card-inner">
          <form id="add-form">
            <div class="grid">
              <label>
                <span>Action précise</span>
                <input id="actionPrecise" placeholder="Ex : Appeler Charlotte" required>
              </label>

              <label>
                <span>Famille de tâches</span>
                <select id="famille"></select>
              </label>

              <label>
                <span>Catégorie d’interlocuteur</span>
                <select id="categorie"></select>
              </label>

              <label>
                <span>Nom</span>
                <input id="nom" placeholder="Optionnel">
              </label>

              <label>
                <span>Temps estimé</span>
                <input id="tempsEstime" type="time" step="60">
              </label>

              <label>
                <span>Temps réel</span>
                <input id="tempsReel" type="time" step="60">
              </label>

              <label>
                <span>Date limite</span>
                <input id="dateLimite" type="date">
              </label>

              <label>
                <span>Statut</span>
                <select id="statut"></select>
              </label>
            </div>

            <div class="actions">
              <button class="btn primary" type="submit">Ajouter</button>
              <button class="btn ghost" id="reset-btn" type="button">Vider</button>
            </div>
          </form>
        </div>
      </div>

      <div class="deco-frame" style="margin-top:12px;">
        <div class="card-inner">
          <div class="list-header">
            <h2 class="list-title">To Do</h2>
          </div>
          <ul id="todo-list"></ul>
        </div>
      </div>
    </section>

    <!-- ONGLET ARCHIVES -->
    <section id="archive-section" class="panel" hidden>
      <div class="archive-wrapper">
        <div class="archive-frame">
          <div class="archive-inner">
            <div class="list-header">
              <h2 class="list-title">Archives</h2>
            </div>
            <ul id="archive-list"></ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <button class="btn ghost" id="export-btn" type="button">Exporter CSV</button>
    <button class="btn ghost" id="import-btn" type="button">Importer CSV</button>
    <input id="import-file" type="file" accept=".csv,text/csv" hidden>
  </footer>

  <script>
    /****************************************************************
     * MENUS déroulants (Macros) + ajout "Moi-même"
     ****************************************************************/
    const FAMILLES = [
      "Amicale","Baroque","CDC/suivi","Communication","Coordination","Correction",
      "Cours","Gestion","Histoire des Arts","Instances","Numérique","Parcours Avenir",
      "Pépinières","Photocopies","Préparation","Réunion"
    ];

    const CATEGORIES = [
      "Moi-même","Parents","Partenaires","Collègues","Administration","Elèves","Professeurs principaux","Public"
    ];

    const STATUTS = ["A faire","En cours","Terminé"];

    /****************************************************************
     * STOCKAGE LOCAL IndexedDB (persistant)
     ****************************************************************/
    const DB_NAME = "todo_local_db";
    const DB_VERSION = 2; // <-- incrémenté (ajout champs temps)
    const STORE = "items";

    function openDb(){
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);

        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORE)) {
            const store = db.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
            store.createIndex("by_statut", "statut");
            store.createIndex("by_archivedAt", "archivedAt");
          } else {
            // rien à faire : les nouveaux champs sont juste ajoutés dans les objets
          }
        };

        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function os(db, mode="readonly"){
      return db.transaction(STORE, mode).objectStore(STORE);
    }

    function addItem(db, item){
      return new Promise((resolve, reject) => {
        const req = os(db, "readwrite").add(item);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function putItem(db, item){
      return new Promise((resolve, reject) => {
        const req = os(db, "readwrite").put(item);
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    }

    function getAll(db){
      return new Promise((resolve, reject) => {
        const req = os(db).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }

    async function markDone(db, id){
      const items = await getAll(db);
      const item = items.find(x => x.id === id);
      if (!item) return;
      item.statut = "Terminé";
      item.archivedAt = Date.now();
      await putItem(db, item);
    }

    async function unarchiveToTodo(db, id){
      const items = await getAll(db);
      const item = items.find(x => x.id === id);
      if (!item) return;
      item.statut = "A faire";
      item.archivedAt = null;
      await putItem(db, item);
    }

    function deleteItem(db, id){
      return new Promise((resolve, reject) => {
        const req = os(db, "readwrite").delete(id);
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    }

    /****************************************************************
     * UI
     ****************************************************************/
    let db = null;
    const $ = (id) => document.getElementById(id);

    function fillSelect(id, values, selected=null){
      const sel = $(id);
      sel.innerHTML = "";
      values.forEach(v => {
        const opt = new Option(v, v);
        if (selected && v === selected) opt.selected = true;
        sel.add(opt);
      });
    }

    function switchTab(tab){
      const todo = $("todo-section");
      const arch = $("archive-section");
      const bTodo = $("tab-todo");
      const bArch = $("tab-archive");

      if (tab === "todo"){
        todo.hidden = false;
        arch.hidden = true;
        bTodo.classList.add("active");
        bArch.classList.remove("active");
      } else {
        todo.hidden = true;
        arch.hidden = false;
        bTodo.classList.remove("active");
        bArch.classList.add("active");
      }
    }

    function esc(str){
      return (str || "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
      }[m]));
    }

    function formatTime(t){
      return t ? `⏱ ${t}` : "";
    }

    async function render(){
      const items = await getAll(db);

      const todoItems = items.filter(x => x.statut !== "Terminé");
      const archItems = items.filter(x => x.statut === "Terminé")
                             .sort((a,b) => (b.archivedAt||0) - (a.archivedAt||0));

      // TODO
      const ulTodo = $("todo-list");
      ulTodo.innerHTML = "";
      todoItems.forEach(item => {
        const li = document.createElement("li");
        li.className = "item";
        const temps = [
          item.tempsEstime ? `⏳ estimé ${esc(item.tempsEstime)}` : "",
          item.tempsReel ? `✅ réel ${esc(item.tempsReel)}` : ""
        ].filter(Boolean).join(" • ");

        li.innerHTML = `
          <button class="icon-btn" title="Marquer Terminé">✓</button>
          <div class="main">
            <div class="line">${esc(item.actionPrecise)}</div>
            <div class="meta">
              ${esc(item.famille||"")} • ${esc(item.categorie||"")}
              ${item.nom ? " • " + esc(item.nom) : ""}
              ${item.dateLimite ? " • 📅 " + esc(item.dateLimite) : ""}
              ${temps ? " • " + temps : ""}
            </div>
          </div>
          <button class="icon-btn trash" title="Supprimer">🗑</button>
        `;

        li.querySelector(".icon-btn").addEventListener("click", async () => {
          await markDone(db, item.id);
          await render();
        });

        li.querySelector(".trash").addEventListener("click", async () => {
          await deleteItem(db, item.id);
          await render();
        });

        ulTodo.appendChild(li);
      });

      // ARCHIVES
      const ulArch = $("archive-list");
      ulArch.innerHTML = "";
      archItems.forEach(item => {
        const li = document.createElement("li");
        li.className = "item archive-item";
        const stamp = item.archivedAt ? new Date(item.archivedAt).toLocaleDateString("fr-FR") : "";
        const temps = [
          item.tempsEstime ? `⏳ estimé ${esc(item.tempsEstime)}` : "",
          item.tempsReel ? `✅ réel ${esc(item.tempsReel)}` : ""
        ].filter(Boolean).join(" • ");

        li.innerHTML = `
          <button class="icon-btn back" title="Reprendre (retour à À faire)">↩︎</button>
          <div class="main">
            <div class="line">${esc(item.actionPrecise)}</div>
            <div class="meta">
              ${esc(item.famille||"")} • ${esc(item.categorie||"")}
              ${item.nom ? " • " + esc(item.nom) : ""}
              ${item.dateLimite ? " • 📅 " + esc(item.dateLimite) : ""}
              ${temps ? " • " + temps : ""}
            </div>
            <div class="stamp">Archivé le ${esc(stamp)}</div>
          </div>
        `;

        li.querySelector(".back").addEventListener("click", async () => {
          await unarchiveToTodo(db, item.id);
          switchTab("todo");
          await render();
        });

        ulArch.appendChild(li);
      });
    }

    /****************************************************************
     * Import / Export CSV (format Numbers ; ) + temps estimé/réel
     ****************************************************************/
    function exportCSV(items){
      const headers = [
        "Numéro",
        "Famille de tâches",
        "Action précise",
        "Catégorie d'interlocuteur",
        "Nom",
        "Temps estimé",
        "Temps réel",
        "Date limite",
        "Statut"
      ];

      const rows = items.map((item, idx) => ([
        idx + 1,
        item.famille || "",
        item.actionPrecise || "",
        item.categorie || "",
        item.nom || "",
        item.tempsEstime || "",
        item.tempsReel || "",
        item.dateLimite || "",
        item.statut || ""
      ].join(";")));

      const csv = [headers.join(";"), ...rows].join("\n");
      const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "todo-export.csv";
      a.click();

      URL.revokeObjectURL(url);
    }

    async function importCSV(file){
      const text = await file.text();
      const lines = text.split(/\r?\n/).filter(l => l.trim().length);
      if (lines.length < 2) return;

      const headers = lines[0].split(";").map(h => h.trim());
      const idx = (name) => headers.findIndex(h => h.toLowerCase() === name.toLowerCase());

      const iFam  = idx("Famille de tâches");
      const iAct  = idx("Action précise");
      const iCat  = idx("Catégorie d'interlocuteur");
      const iNom  = idx("Nom");
      const iTEst = idx("Temps estimé");
      const iTRe  = idx("Temps réel");
      const iDate = idx("Date limite");
      const iStat = idx("Statut");

      for (let i = 1; i < lines.length; i++){
        const vals = lines[i].split(";");
        const action = (vals[iAct] || "").trim();
        if (!action) continue;

        const statut = (vals[iStat] || "A faire").trim();
        const item = {
          actionPrecise: action,
          famille: (vals[iFam] || "").trim(),
          categorie: (vals[iCat] || "").trim(),
          nom: (vals[iNom] || "").trim(),
          tempsEstime: (iTEst >= 0 ? (vals[iTEst] || "").trim() : ""),
          tempsReel:   (iTRe  >= 0 ? (vals[iTRe]  || "").trim() : ""),
          dateLimite: (vals[iDate] || "").trim(),
          statut,
          archivedAt: (statut === "Terminé") ? Date.now() : null
        };
        await addItem(db, item);
      }
    }

    /****************************************************************
     * INIT
     ****************************************************************/
    document.addEventListener("DOMContentLoaded", async () => {
      // Service worker (ton fichier app.jws) : si tu ne vois pas les changements,
      // c'est souvent le cache du service workerker_API/Using_Service_Workers)
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./app.jws");
      }

      db = await openDb();

      fillSelect("famille", FAMILLES, FAMILLES[0]);
      fillSelect("categorie", CATEGORIES, "Moi-même");
      fillSelect("statut", STATUTS, "A faire");

      $("tab-todo").addEventListener("click", () => switchTab("todo"));
      $("tab-archive").addEventListener("click", () => switchTab("archive"));

      $("add-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const statut = $("statut").value;
        const item = {
          actionPrecise: $("actionPrecise").value.trim(),
          famille: $("famille").value,
          categorie: $("categorie").value,
          nom: $("nom").value.trim(),
          tempsEstime: $("tempsEstime").value,
          tempsReel: $("tempsReel").value,
          dateLimite: $("dateLimite").value,
          statut,
          archivedAt: (statut === "Terminé") ? Date.now() : null
        };

        await addItem(db, item);
        e.target.reset();
        fillSelect("statut", STATUTS, "A faire");
        fillSelect("categorie", CATEGORIES, "Moi-même");
        await render();
      });

      $("reset-btn").addEventListener("click", () => $("add-form").reset());

      $("export-btn").addEventListener("click", async () => {
        const items = await getAll(db);
        exportCSV(items);
      });

      $("import-btn").addEventListener("click", () => $("import-file").click());

      $("import-file").addEventListener("change", async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        await importCSV(file);
        e.target.value = "";
        await render();
      });

      await render();
    });
  </script>
</body>
</html>
