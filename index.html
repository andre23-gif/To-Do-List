<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To Do List</title>

  <!-- Version (auto‑update) -->
  <meta name="app-build" content="2026-04-22.8">

  <!-- PWA (✅ plus de texte parasite) -->
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="theme-color" content="#0B1F3B">

  <style>
/* =====================
   STYLE (reprend le tien)
===================== */
:root{
  --navy:#0B1F3B;
  --navy2:#07162A;
  --gold:#C8A24A;
  --paper:#FBFAF6;
  --card:rgba(255,255,255,.94);
  --ink:#101216;
  --radius:14px;
  --shadow:0 14px 34px rgba(0,0,0,.12);
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:system-ui,-apple-system,ui-rounded,sans-serif;
  background: var(--paper);
  color:var(--ink);
}

header{
  background: linear-gradient(180deg,var(--navy),#07162A);
  color:#fff;
  padding:14px;
}

.wrap{ max-width:980px; margin:0 auto; }

.tabs{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.tab{
  padding:8px 12px;
  border-radius:999px;
  border:1px solid #c8a24a;
  background:transparent;
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

.tab.active{
  background:linear-gradient(135deg,#c8a24a,#e2c978);
  color:#07162A;
}

main{
  max-width:980px;
  margin:0 auto;
  padding:14px 10px 90px;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:12px;
}

.actions{ display:flex; gap:10px; }

.btn{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid #999;
  background:#fff;
  cursor:pointer;
  font-weight:700;
}

.btn.gold{
  background:linear-gradient(135deg,#c8a24a,#e2c978);
}

.note{
  font-size:12px;
  margin-top:8px;
  color:#555;
}

canvas{ width:100%; height:260px; }

footer{
  position:fixed;
  bottom:0; left:0; right:0;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:rgba(255,255,255,.95);
  border-top:1px solid #ddd;
}
  </style>
</head>

<body>

<header>
  <div class="wrap">
    <h1>✓ To Do List</h1>
    <div class="tabs">
      <button class="tab active" id="tab-todo">À faire</button>
      <button class="tab" id="tab-archive">Archives</button>
      <button class="tab" id="tab-stats">Statistiques</button>
    </div>
  </div>
</header>

<main>

<section id="todo-section">
  <div class="card">
    <h3>Nouvelle tâche</h3>

    <input id="actionPrecise" placeholder="Action précise"><br><br>

    <label>Famille</label>
    <select id="famille"></select><br><br>

    <label>Catégorie</label>
    <select id="categorie"></select><br><br>

    <label>Temps estimé</label>
    <input id="tempsEstime" type="time" step="60"><br><br>

    <div class="actions">
      <button class="btn gold" id="addBtn">Ajouter</button>
      <button class="btn" id="resetBtn">Vider</button>
    </div>
  </div>

  <div class="card">
    <h3>Liste</h3>
    <ul id="todo-list"></ul>
  </div>
</section>

<section id="archive-section" hidden>
  <div class="card">
    <h3>Archives</h3>
    <ul id="archive-list"></ul>
  </div>
</section>

<section id="stats-section" hidden>
  <div class="card">
    <h3>Statistiques – Temps</h3>
    <canvas id="lineChart" width="1000" height="260"></canvas>
    <div id="lineLegend" class="note"></div>
  </div>
</section>

</main>

<footer>
  <button class="btn" id="exportBtn">Exporter CSV</button>
  <button class="btn" id="importBtn">Importer CSV</button>
  <input type="file" id="importFile" hidden>
</footer>

<script>
/* =====================
   DONNÉES + DB
===================== */
const FAMILLES=["Amicale","Gestion","Cours","Réunion"];
const CATEGORIES=["Moi‑même","Collègues","Administration"];

const DB_NAME="todo_db";
const STORE="items";
let db;

const $=id=>document.getElementById(id);

function openDb(){
  return new Promise(r=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=()=>req.result.createObjectStore(STORE,{keyPath:"id",autoIncrement:true});
    req.onsuccess=()=>r(req.result);
  });
}

function getAll(){
  return new Promise(r=>{
    const tx=db.transaction(STORE);
    const req=tx.objectStore(STORE).getAll();
    req.onsuccess=()=>r(req.result||[]);
  })
}

function addItem(it){
  return new Promise(r=>{
    const tx=db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).add(it).onsuccess=r;
  })
}

function putItem(it){
  return new Promise(r=>{
    const tx=db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(it).onsuccess=r;
  })
}

/* =====================
   LOGIQUE MÉTIER
===================== */
async function finishTask(it){
  if(!it.tempsReel){
    const s=prompt("Temps réel (HH:MM)",it.tempsEstime||"00:00");
    if(!s) return;
    it.tempsReel=s;
  }
  it.statut="Terminé";
  it.archivedAt=Date.now();
  await putItem(it);
  render();
}

/* =====================
   RENDER
===================== */
async function render(){
  const items=await getAll();
  $("todo-list").innerHTML="";
  $("archive-list").innerHTML="";

  const curveLabels=[];
  const curveValues=[];

  items.forEach(it=>{
    if(it.statut==="Terminé"){
      const li=document.createElement("li");
      li.textContent=it.actionPrecise;
      $("archive-list").append(li);

      if(it.tempsReel){
        const mins=parseInt(it.tempsReel.split(":")[0])*60+parseInt(it.tempsReel.split(":")[1]);
        curveLabels.push(new Date(it.archivedAt).toLocaleDateString("fr-FR"));
        curveValues.push(mins);
      }
    }else{
      const li=document.createElement("li");
      li.innerHTML=`${it.actionPrecise} <button>✓</button>`;
      li.querySelector("button").onclick=()=>finishTask(it);
      $("todo-list").append(li);
    }
  });

  drawLine($("lineChart"),curveLabels,curveValues);
}

/* =====================
   GRAPHIQUE TEMPS
===================== */
function drawLine(canvas,labels,values){
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!values.length){
    $("lineLegend").textContent="Aucune donnée de temps.";
    return;
  }

  const max=Math.max(...values);
  const pad=50;
  const w=canvas.width-pad*2;
  const h=canvas.height-pad*2;

  ctx.beginPath();
  ctx.moveTo(pad,pad);
  ctx.lineTo(pad,pad+h);
  ctx.lineTo(pad+w,pad+h);
  ctx.stroke();

  ctx.strokeStyle="#c8a24a";
  ctx.beginPath();
  values.forEach((v,i)=>{
    const x=pad+(w/(values.length-1||1))*i;
    const y=pad+h-(v/max)*h;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();

  $("lineLegend").innerHTML=`Temps réel<br>Période : ${labels[0]} → ${labels.at(-1)}<br>Total : ${values.reduce((a,b)=>a+b,0)} min`;
}

/* =====================
   INIT
===================== */
document.addEventListener("DOMContentLoaded",async()=>{
  db=await openDb();
  FAMILLES.forEach(f=>$("famille").add(new Option(f,f)));
  CATEGORIES.forEach(c=>$("categorie").add(new Option(c,c)));

  $("addBtn").onclick=async()=>{
    await addItem({
      actionPrecise:$("actionPrecise").value,
      famille:$("famille").value,
      categorie:$("categorie").value,
      tempsEstime:$("tempsEstime").value,
      statut:"A faire",
      archivedAt:null
    });
    render();
  };

  $("resetBtn").onclick=()=>{$("actionPrecise").value="";};

  $("tab-todo").onclick=()=>switchTab("todo");
  $("tab-archive").onclick=()=>switchTab("archive");
  $("tab-stats").onclick=()=>switchTab("stats");

  await render();
});

function switchTab(t){
  ["todo","archive","stats"].forEach(x=>{
    $(`${x}-section`).hidden = x!==t;
    $(`tab-${x}`).classList.toggle("active",x===t);
  });
}
</script>

</body>
</html>
