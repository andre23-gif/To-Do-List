<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To Do List</title>

  <!-- ✅ PWA : NE PAS ÉCRIRE LES CHEMINS EN TEXTE, MAIS EN <link> -->
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
  <meta name="theme-color" content="#0B1F3B">

  <style>
    :root{
      --navy:#0B1F3B;
      --navy2:#07162A;
      --gold:#C8A24A;
      --gold2:#E2C978;
      --ink:#121316;
      --paper:#FBFAF6;
      --ivory:#FFFDF7;
      --shadow: 0 18px 40px rgba(0,0,0,.14);
      --radius: 14px;

      --green:#1F7A4C;
      --green2:#2CA768;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background: radial-gradient(1200px 600px at 50% -200px, rgba(200,162,74,.18), transparent 55%),
                  linear-gradient(180deg, rgba(11,31,59,.10), transparent 35%),
                  var(--paper);
      color:var(--ink);
      font-family: ui-rounded, system-ui, -apple-system, sans-serif;
    }

    header{
      padding:18px 14px 12px;
      background: linear-gradient(180deg, rgba(11,31,59,.92), rgba(7,22,42,.92));
      color:#fff;
      border-bottom: 3px solid rgba(200,162,74,.55);
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }
    .wrap{ max-width: 980px; margin:0 auto; }
    .title{
      margin:0;
      font-weight: 900;
      letter-spacing:.6px;
      font-size: 28px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .title-badge{
      width:34px;height:34px;
      border-radius:10px;
      background: linear-gradient(135deg, rgba(200,162,74,.95), rgba(226,201,120,.95));
      display:inline-flex;
      align-items:center;justify-content:center;
      color: var(--navy2);
      font-weight: 900;
      box-shadow: inset 0 0 0 2px rgba(7,22,42,.18);
    }

    .tabs{
      margin-top:14px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    .tab{
      border: 2px solid rgba(200,162,74,.75);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      color:#fff;
      padding:14px 18px;
      border-radius: 999px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.08);
    }
    .tab.active{
      background: linear-gradient(135deg, rgba(200,162,74,.96), rgba(226,201,120,.96));
      color: var(--navy2);
      border-color: rgba(226,201,120,.9);
    }

    main{
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 10px 92px;
    }
    .panel{ margin-top: 12px; }

    /* Cadre art déco */
    .deco-frame{
      --c: var(--gold);
      --b: 2px;
      --o1: 16px;
      --o2: 10px;
      position: relative;
      border: var(--o1) solid transparent;
      border-radius: var(--radius);
      outline: var(--b) solid var(--c);
      outline-offset: calc(-1 * var(--o2));
      background:
        conic-gradient(from 90deg at var(--b) var(--b),
          transparent 25%,
          rgba(200,162,74,.95) 0) 0 0 /
        calc(100% - var(--b)) calc(100% - var(--b))
        padding-box border-box;
      background-color: rgba(255,255,255,.86);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-inner{
      padding: 16px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.80));
    }

    /* FORM */
    .grid{
      display:grid;
      gap:12px;
      grid-template-columns: repeat(2, minmax(0,1fr));
    }
    @media (max-width: 760px){
      .grid{ grid-template-columns: 1fr; }
    }

    /* ✅ 2 lignes / 2 colonnes (pas de chevauchement) */
    .grid-mini{
      margin-top: 10px;
      display:grid;
      gap:10px;
      grid-template-columns: repeat(2, minmax(0,1fr));
    }
    .grid-mini > label{ min-width:0; } /* ✅ empêche le chevauchement */
    @media (max-width: 760px){
      .grid-mini{ grid-template-columns: 1fr; }
    }

    label span{
      display:block;
      font-size:12px;
      opacity:.82;
      margin:0 0 6px;
      color: rgba(11,31,59,.88);
      font-weight: 900;
      letter-spacing: .2px;
    }
    input, select, textarea{
      width:100%;
      padding:12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(7,22,42,.18);
      background: rgba(255,255,255,.98);
      font:inherit;
      outline:none;
      min-width:0;
    }

    /* Petits encarts */
    .mini-field input,
    .mini-field select{
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 900;
    }

    input:focus, select:focus, textarea:focus{
      border-color: rgba(200,162,74,.9);
      box-shadow: 0 0 0 4px rgba(200,162,74,.18);
    }
    textarea{ min-height: 92px; resize: vertical; }

    .actions{
      display:flex;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn{
      border:0;
      padding:12px 16px;
      border-radius: 999px;
      cursor:pointer;
      font:inherit;
      font-weight: 950;
      letter-spacing:.2px;
    }
    .btn.primary{
      background: linear-gradient(135deg, rgba(200,162,74,.96), rgba(226,201,120,.96));
      color: var(--navy2);
      border: 2px solid rgba(7,22,42,.12);
      box-shadow: 0 10px 22px rgba(0,0,0,.16);
    }
    .btn.ghost{
      background: transparent;
      border: 2px solid rgba(11,31,59,.28);
      color: var(--navy2);
    }
    .btn.green{
      background: linear-gradient(135deg, rgba(31,122,76,.92), rgba(44,167,104,.92));
      color:#fff;
      border: 2px solid rgba(255,255,255,.12);
      box-shadow: 0 10px 22px rgba(0,0,0,.14);
    }

    /* LISTES : ✅ pas de chevauchement => layout en GRID */
    ul{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }

    .item{
      display:grid;
      grid-template-columns: 46px 1fr 140px 46px; /* ✓ | contenu | statut petit | poubelle */
      gap:10px;
      align-items:start;
      padding:12px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(11,31,59,.05), rgba(200,162,74,.06));
      border: 1px solid rgba(7,22,42,.10);
    }
    @media (max-width: 760px){
      .item{
        grid-template-columns: 46px 1fr;
        grid-template-areas:
          "done main"
          "status trash";
      }
      .item .donebtn{ grid-area: done; }
      .item .main{ grid-area: main; }
      .item .status-small{ grid-area: status; width: 100%; }
      .item .trashbtn{ grid-area: trash; justify-self:end; }
    }
    .item.meeting{
      background: linear-gradient(180deg, rgba(31,122,76,.10), rgba(44,167,104,.16));
      border-color: rgba(31,122,76,.20);
    }
    .main{ min-width:0; }
    .line{ font-weight: 950; font-size: 16px; color: var(--navy2); }
    .meta{ font-size:12px; opacity:.86; margin-top:4px; color: rgba(7,22,42,.82); line-height: 1.35; }

    .icon-btn{
      width:46px;height:46px;border-radius:50%;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      user-select:none; font-size: 20px;
      border: 2px solid rgba(200,162,74,.75);
      background: linear-gradient(135deg, rgba(200,162,74,.96), rgba(226,201,120,.96));
      color: var(--navy2);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.18);
    }
    .icon-btn.trash{
      background: rgba(255,255,255,.92);
      color: rgba(7,22,42,.88);
      border: 1px solid rgba(7,22,42,.16);
      font-size: 18px;
    }
    .donebtn{ }
    .trashbtn{ }

    /* ✅ Statut petit à droite */
    .status-small{
      width: 140px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(200,162,74,.45);
      background: rgba(255,255,255,.92);
      font-weight: 950;
      color: rgba(7,22,42,.92);
      height: 42px;
      align-self:center;
    }

    /* BANNIÈRE RÉUNION : ✅ enlever "(pop up)" */
    .meeting-banner{ margin-bottom: 12px; }
    .meeting-banner .card-inner{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      background: linear-gradient(135deg, rgba(31,122,76,.10), rgba(44,167,104,.10));
    }
    .meeting-check{
      display:flex; align-items:center; gap:12px;
      cursor:pointer; user-select:none;
      font-weight: 950; color: var(--navy2);
    }
    .meeting-check input{ display:none; }
    .check-box{
      width: 44px; height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(31,122,76,.92), rgba(44,167,104,.92));
      border: 2px solid rgba(226,201,120,.55);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.10);
      position: relative;
      flex: 0 0 auto;
    }
    .meeting-check input:checked + .check-box::after{
      content:"✓";
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      color: var(--gold2);
      font-size: 24px; font-weight: 1000;
      text-shadow: 0 1px 0 rgba(0,0,0,.25);
    }
    .meeting-label{ display:flex; flex-direction:column; gap:2px; }
    .meeting-label .top{
      color: var(--gold2);
      font-weight: 1000;
      font-size: 16px;
      letter-spacing: .6px;
      text-transform: uppercase;
    }
    .meeting-label .sub{
      color: rgba(7,22,42,.70);
      font-size: 12px;
      font-weight: 800;
    }

    /* ARCHIVES */
    .archive-wrapper{ position: relative; padding-left: 18px; }
    .archive-frame{
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      background:
        radial-gradient(700px 400px at 40% 0%, rgba(255,255,255,.35), transparent 60%),
        radial-gradient(900px 600px at 70% 40%, rgba(0,0,0,.06), transparent 65%),
        repeating-linear-gradient(0deg, rgba(0,0,0,.02) 0 2px, rgba(255,255,255,.00) 2px 6px),
        linear-gradient(180deg, #F4E7C9, #EAD7B1);
      border: 2px solid rgba(123,95,42,.45);
      position: relative;
    }
    .archive-frame::before{
      content:""; position:absolute; left:0; top:0; bottom:0;
      width: 20px;
      background: linear-gradient(180deg, rgba(123,95,42,.55), rgba(123,95,42,.25));
      border-right: 2px solid rgba(0,0,0,.12);
      box-shadow: inset -6px 0 10px rgba(0,0,0,.12);
    }
    .archive-inner{ padding: 16px; padding-left: 24px; }
    .archive-item{
      background: rgba(255,255,255,.40);
      border: 1px dashed rgba(0,0,0,.28);
      font-family: "American Typewriter", ui-monospace, Menlo, Monaco, "Courier New", monospace;
    }
    .stamp{ font-size:12px; opacity:.85; color: rgba(123,95,42,.95); margin-top:6px; }

    /* STATS */
    .stats-grid{ display:grid; gap:12px; grid-template-columns: 1fr; }
    .stats-controls{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
    .canvas-wrap{
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(7,22,42,.12);
      border-radius: 14px;
      padding: 10px;
      overflow:hidden;
    }
    canvas{ width:100%; height: 280px; }

    /* MODAL */
    .modal-overlay{
      position: fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 14px;
      z-index: 9999;
    }
    .modal-overlay.open{ display:flex; }
    .modal{ width: min(920px, 100%); border-radius: 16px; overflow:hidden; }
    .modal-head{
      background: linear-gradient(180deg, rgba(11,31,59,.96), rgba(7,22,42,.96));
      color:#fff;
      padding: 14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom: 3px solid rgba(200,162,74,.55);
    }
    .modal-title{ margin:0; font-weight: 950; letter-spacing:.4px; display:flex; align-items:center; gap:10px; font-size: 18px; }
    .close-x{
      background: transparent;
      color:#fff;
      border: 2px solid rgba(255,255,255,.20);
      border-radius: 12px;
      padding: 8px 10px;
      cursor:pointer;
      font-weight: 900;
    }
    .modal-body{ background: var(--ivory); padding: 14px; }

    footer{
      position:fixed; left:0; right:0; bottom:0;
      display:flex; gap:10px;
      justify-content:center;
      padding:10px;
      background: rgba(251,250,246,.92);
      backdrop-filter: blur(8px);
      border-top: 1px solid rgba(0,0,0,.08);
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <h1 class="title">
        <span class="title-badge">✓</span>
        To Do List
      </h1>

      <div class="tabs" role="tablist" aria-label="Onglets">
        <button id="tab-todo" class="tab active" type="button" role="tab">À faire</button>
        <button id="tab-archive" class="tab" type="button" role="tab">Archives</button>
        <button id="tab-stats" class="tab" type="button" role="tab">Statistiques</button>
      </div>
    </div>
  </header>

  <main>
    <!-- TODO -->
    <section id="todo-section" class="panel">

      <!-- Réunion : checkbox -->
      <div class="deco-frame meeting-banner" style="--c: rgba(44,167,104,.80);">
        <div class="card-inner">
          <label class="meeting-check" for="meetingToggle">
            <input id="meetingToggle" type="checkbox">
            <span class="check-box"></span>
            <span class="meeting-label">
              <span class="top">Réunion</span>
              <span class="sub">Créer un rendez-vous</span>
            </span>
          </label>

          <button class="btn green" id="meetingQuick" type="button">Ouvrir</button>
        </div>
      </div>

      <div class="deco-frame">
        <div class="card-inner">
          <form id="add-form">
            <div class="grid">
              <label>
                <span>Action précise</span>
                <input id="actionPrecise" placeholder="Ex : Appeler Charlotte" required>
              </label>

              <label>
                <span>Famille de tâches</span>
                <select id="famille"></select>
              </label>

              <label>
                <span>Catégorie d’interlocuteur</span>
                <select id="categorie"></select>
              </label>

              <label>
                <span>Nom</span>
                <input id="nom" placeholder="Optionnel">
              </label>
            </div>

            <!-- 2 lignes / petits encarts -->
            <div class="grid-mini">
              <label class="mini-field">
                <span>Temps estimé</span>
                <input id="tempsEstime" type="time" step="60">
              </label>
              <label class="mini-field">
                <span>Temps réel</span>
                <input id="tempsReel" type="time" step="60">
              </label>
            </div>

            <div class="grid-mini">
              <label class="mini-field">
                <span>Date limite</span>
                <input id="dateLimite" type="date">
              </label>
              <label class="mini-field">
                <span>Statut</span>
                <select id="statut"></select>
              </label>
            </div>

            <div class="actions">
              <button class="btn primary" type="submit">Ajouter</button>
              <button class="btn ghost" id="reset-btn" type="button">Vider</button>
            </div>
          </form>
        </div>
      </div>

      <div class="deco-frame" style="margin-top:12px;">
        <div class="card-inner">
          <div class="list-header">
            <h2 style="margin:0;font-weight:950;color:var(--navy2);">To Do</h2>
          </div>
          <ul id="todo-list"></ul>
        </div>
      </div>
    </section>

    <!-- ARCHIVES -->
    <section id="archive-section" class="panel" hidden>
      <div class="archive-wrapper">
        <div class="archive-frame">
          <div class="archive-inner">
            <div class="list-header">
              <h2 style="margin:0;font-weight:950;color:var(--navy2);">Archives</h2>
            </div>
            <ul id="archive-list"></ul>
          </div>
        </div>
      </div>
    </section>

    <!-- STATS (rétablie) -->
    <section id="stats-section" class="panel" hidden>
      <div class="deco-frame">
        <div class="card-inner">
          <div class="list-header">
            <h2 style="margin:0;font-weight:950;color:var(--navy2);">Statistiques</h2>
          </div>

          <div class="stats-controls">
            <label style="min-width:180px;">
              <span>Du</span>
              <input id="statsFrom" type="date">
            </label>
            <label style="min-width:180px;">
              <span>Au</span>
              <input id="statsTo" type="date">
            </label>
            <label style="min-width:220px;">
              <span>Temps</span>
              <select id="statsTimeMode">
                <option value="reel">Temps réel</option>
                <option value="estime">Temps estimé</option>
              </select>
            </label>
            <button class="btn primary" id="statsRefresh" type="button">Mettre à jour</button>
          </div>

          <div class="stats-grid" style="margin-top:12px;">
            <div class="canvas-wrap">
              <div style="font-weight:950;color:rgba(7,22,42,.92);margin-bottom:6px;">Courbe : minutes par jour</div>
              <canvas id="lineChart" width="1000" height="280"></canvas>
            </div>
            <div class="canvas-wrap">
              <div style="font-weight:950;color:rgba(7,22,42,.92);margin-bottom:6px;">Camembert : par famille</div>
              <canvas id="pieChart" width="1000" height="280"></canvas>
            </div>
            <div class="canvas-wrap">
              <div style="font-weight:950;color:rgba(7,22,42,.92);margin-bottom:6px;">Histogramme : par statut</div>
              <canvas id="barChart" width="1000" height="280"></canvas>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <button class="btn ghost" id="export-btn" type="button">Exporter CSV</button>
    <button class="btn ghost" id="import-btn" type="button">Importer CSV</button>
    <input id="import-file" type="file" accept=".csv,text/csv" hidden>
  </footer>

  <!-- MODAL RÉUNION -->
  <div id="meetingModal" class="modal-overlay" aria-hidden="true">
    <div class="modal deco-frame" style="--c: var(--green2);">
      <div class="modal-head">
        <h3 class="modal-title">
          <span class="title-badge" style="width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg, rgba(31,122,76,.92), rgba(44,167,104,.92));color:#fff;">R</span>
          Réunion
        </h3>
        <button class="close-x" id="closeMeeting" type="button">✕</button>
      </div>
      <div class="modal-body">
        <form id="meeting-form">

          <!-- ✅ 2 colonnes, responsive, PAS DE CHEVAUCHEMENT -->
          <div class="grid-mini">
            <label class="mini-field">
              <span>Date</span>
              <input id="m_date" type="date" required>
            </label>
            <label class="mini-field">
              <span>Heure</span>
              <input id="m_time" type="time" step="60" required>
            </label>
          </div>

          <div class="grid-mini" style="margin-top:10px;">
            <label class="mini-field">
              <span>Lieu</span>
              <input id="m_place" placeholder="Ex : Salle 12 / Visio">
            </label>
            <label class="mini-field">
              <span>Personnes invitées</span>
              <input id="m_people" placeholder="Ex : Nom1, Nom2...">
            </label>
          </div>

          <div class="grid" style="margin-top:10px;">
            <label>
              <span>Besoins particuliers</span>
              <textarea id="m_needs" placeholder="Ex : vidéoprojecteur, documents..."></textarea>
            </label>
            <label>
              <span>Compte rendu</span>
              <textarea id="m_minutes" placeholder="Notes / décisions / actions..."></textarea>
            </label>
          </div>

          <div class="actions">
            <button class="btn green" type="submit">Le rendez-vous est pris</button>
            <button class="btn ghost" id="meetingCancel" type="button">Annuler</button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <script>
    // Menus
    const FAMILLES = [
      "Amicale","Baroque","CDC/suivi","Communication","Coordination","Correction",
      "Cours","Gestion","Histoire des Arts","Instances","Numérique","Parcours Avenir",
      "Pépinières","Photocopies","Préparation","Réunion"
    ];
    const CATEGORIES = [
      "Moi-même","Parents","Partenaires","Collègues","Administration","Elèves","Professeurs principaux","Public"
    ];
    const STATUTS = ["A faire","En cours","Terminé"];

    // IndexedDB
    const DB_NAME = "todo_local_db";
    const DB_VERSION = 6;
    const STORE = "items";

    function openDb(){
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORE)) {
            const store = db.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
            store.createIndex("by_statut", "statut");
            store.createIndex("by_archivedAt", "archivedAt");
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    function os(db, mode="readonly"){ return db.transaction(STORE, mode).objectStore(STORE); }
    function addItem(db, item){
      return new Promise((resolve, reject) => {
        const req = os(db, "readwrite").add(item);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    function putItem(db, item){
      return new Promise((resolve, reject) => {
        const req = os(db, "readwrite").put(item);
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    }
    function getAll(db){
      return new Promise((resolve, reject) => {
        const req = os(db).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }
    async function updateStatus(db, id, statut){
      const items = await getAll(db);
      const item = items.find(x => x.id === id);
      if (!item) return;
      item.statut = statut;
      if (statut === "Terminé") item.archivedAt = Date.now();
      if (statut !== "Terminé") item.archivedAt = null;
      await putItem(db, item);
    }
    function deleteItem(db, id){
      return new Promise((resolve, reject) => {
        const req = os(db, "readwrite").delete(id);
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    }

    // Helpers UI
    let db = null;
    const $ = (id) => document.getElementById(id);
    function fillSelect(id, values, selected=null){
      const sel = $(id);
      sel.innerHTML = "";
      values.forEach(v => {
        const opt = new Option(v, v);
        if (selected && v === selected) opt.selected = true;
        sel.add(opt);
      });
    }
    function switchTab(tab){
      $("todo-section").hidden = (tab !== "todo");
      $("archive-section").hidden = (tab !== "archive");
      $("stats-section").hidden = (tab !== "stats");
      $("tab-todo").classList.toggle("active", tab==="todo");
      $("tab-archive").classList.toggle("active", tab==="archive");
      $("tab-stats").classList.toggle("active", tab==="stats");
    }
    function esc(str){
      return (str || "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
      }[m]));
    }
    function parseTimeToMinutes(t){
      if (!t || !t.includes(":")) return 0;
      const [hh, mm] = t.split(":").map(n => parseInt(n,10));
      if (Number.isNaN(hh)||Number.isNaN(mm)) return 0;
      return hh*60+mm;
    }
    function dateKeyForItem(item){
      if (item.dateLimite) return item.dateLimite;
      if (item.isMeeting && item.meeting?.date) return item.meeting.date;
      return new Date(item.createdAt || Date.now()).toISOString().slice(0,10);
    }

    // Modal réunion
    function openMeetingModal(){
      $("meetingModal").classList.add("open");
      $("meetingModal").setAttribute("aria-hidden","false");
    }
    function closeMeetingModal(){
      $("meetingModal").classList.remove("open");
      $("meetingModal").setAttribute("aria-hidden","true");
      $("meeting-form").reset();
      $("meetingToggle").checked = false;
    }
    async function createMeetingTask(){
      const meeting = {
        date: $("m_date").value,
        time: $("m_time").value,
        place: $("m_place").value.trim(),
        people: $("m_people").value.trim(),
        needs: $("m_needs").value.trim(),
        minutes: $("m_minutes").value.trim()
      };
      const label = `Réunion ${meeting.date || ""} ${meeting.time || ""}`.trim();

      const item = {
        createdAt: Date.now(),
        actionPrecise: label || "Réunion",
        famille: "Réunion",
        categorie: "Moi-même",
        nom: meeting.people || "",
        tempsEstime: "",
        tempsReel: "",
        dateLimite: meeting.date || "",
        statut: "A faire",
        archivedAt: null,
        isMeeting: true,
        meeting
      };
      await addItem(db, item);
    }

    // Render
    async function render(){
      const items = await getAll(db);
      const todoItems = items.filter(x => x.statut !== "Terminé");
      const archItems = items.filter(x => x.statut === "Terminé").sort((a,b) => (b.archivedAt||0)-(a.archivedAt||0));
      renderTodo(todoItems);
      renderArchive(archItems);
      if (!$("stats-section").hidden) renderStats(items);
    }

    function renderTodo(list){
      const ul = $("todo-list");
      ul.innerHTML = "";

      list.forEach(item => {
        const li = document.createElement("li");
        li.className = "item" + (item.isMeeting ? " meeting" : "");

        const temps = [
          item.tempsEstime ? `⏳ estimé ${esc(item.tempsEstime)}` : "",
          item.tempsReel ? `✅ réel ${esc(item.tempsReel)}` : ""
        ].filter(Boolean).join(" • ");

        const meetingInfo = item.isMeeting && item.meeting
          ? `📍 ${esc(item.meeting.place || "")} • 🗓 ${esc(item.meeting.date || "")} ${esc(item.meeting.time || "")}`
          : "";

        li.innerHTML = `
          <button class="icon-btn donebtn" title="Terminé">✓</button>
          <div class="main">
            <div class="line">${esc(item.actionPrecise)}</div>
            <div class="meta">
              ${esc(item.famille||"")} • ${esc(item.categorie||"")}
              ${item.nom ? " • " + esc(item.nom) : ""}
              ${item.dateLimite ? " • 📅 " + esc(item.dateLimite) : ""}
              ${temps ? " • " + temps : ""}
              ${meetingInfo ? " • " + meetingInfo : ""}
            </div>
          </div>

          <select class="status-small" aria-label="Statut">
            ${STATUTS.map(s => `<option value="${s}" ${item.statut===s?"selected":""}>${s}</option>`).join("")}
          </select>

          <button class="icon-btn trash trashbtn" title="Supprimer">🗑</button>
        `;

        li.querySelector(".donebtn").addEventListener("click", async () => {
          await updateStatus(db, item.id, "Terminé");
          await render();
        });
        li.querySelector(".trashbtn").addEventListener("click", async () => {
          await deleteItem(db, item.id);
          await render();
        });
        li.querySelector(".status-small").addEventListener("change", async (e) => {
          await updateStatus(db, item.id, e.target.value);
          await render();
        });

        ul.appendChild(li);
      });
    }

    function renderArchive(list){
      const ul = $("archive-list");
      ul.innerHTML = "";

      list.forEach(item => {
        const li = document.createElement("li");
        li.className = "item archive-item";

        const stamp = item.archivedAt ? new Date(item.archivedAt).toLocaleDateString("fr-FR") : "";
        const temps = [
          item.tempsEstime ? `⏳ estimé ${esc(item.tempsEstime)}` : "",
          item.tempsReel ? `✅ réel ${esc(item.tempsReel)}` : ""
        ].filter(Boolean).join(" • ");

        li.innerHTML = `
          <button class="icon-btn back donebtn" title="Reprendre">↩︎</button>
          <div class="main">
            <div class="line">${esc(item.actionPrecise)}</div>
            <div class="meta">
              ${esc(item.famille||"")} • ${esc(item.categorie||"")}
              ${item.nom ? " • " + esc(item.nom) : ""}
              ${item.dateLimite ? " • 📅 " + esc(item.dateLimite) : ""}
              ${temps ? " • " + temps : ""}
            </div>
            <div class="stamp">Archivé le ${esc(stamp)}</div>
          </div>
          <div></div>
          <div></div>
        `;
        li.querySelector(".back").addEventListener("click", async () => {
          await updateStatus(db, item.id, "A faire");
          switchTab("todo");
          await render();
        });

        ul.appendChild(li);
      });
    }

    // CSV
    function exportCSV(items){
      const headers = [
        "Numéro","Famille de tâches","Action précise","Catégorie d'interlocuteur",
        "Nom","Temps estimé","Temps réel","Date limite","Statut"
      ];
      const rows = items.map((item, idx) => ([
        idx + 1,
        item.famille || "",
        item.actionPrecise || "",
        item.categorie || "",
        item.nom || "",
        item.tempsEstime || "",
        item.tempsReel || "",
        item.dateLimite || "",
        item.statut || ""
      ].join(";")));

      const csv = [headers.join(";"), ...rows].join("\n");
      const blob = new Blob([csv], { type:"text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "todo-export.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    async function importCSV(file){
      const text = await file.text();
      const lines = text.split(/\r?\n/).filter(l => l.trim().length);
      if (lines.length < 2) return;

      const headers = lines[0].split(";").map(h => h.trim());
      const idx = (name) => headers.findIndex(h => h.toLowerCase() === name.toLowerCase());

      const iFam  = idx("Famille de tâches");
      const iAct  = idx("Action précise");
      const iCat  = idx("Catégorie d'interlocuteur");
      const iNom  = idx("Nom");
      const iTEst = idx("Temps estimé");
      const iTRe  = idx("Temps réel");
      const iDate = idx("Date limite");
      const iStat = idx("Statut");

      for (let i = 1; i < lines.length; i++){
        const vals = lines[i].split(";");
        const action = (vals[iAct] || "").trim();
        if (!action) continue;

        const statut = (vals[iStat] || "A faire").trim();
        const item = {
          createdAt: Date.now(),
          actionPrecise: action,
          famille: (vals[iFam] || "").trim(),
          categorie: (vals[iCat] || "").trim(),
          nom: (vals[iNom] || "").trim(),
          tempsEstime: (iTEst >= 0 ? (vals[iTEst] || "").trim() : ""),
          tempsReel:   (iTRe  >= 0 ? (vals[iTRe]  || "").trim() : ""),
          dateLimite: (vals[iDate] || "").trim(),
          statut,
          archivedAt: (statut === "Terminé") ? Date.now() : null,
          isMeeting: false,
          meeting: null
        };
        await addItem(db, item);
      }
    }

    // ====== STATS (canvas simple) ======
    function clearCanvas(c){
      const ctx = c.getContext("2d");
      ctx.clearRect(0,0,c.width,c.height);
      return ctx;
    }
    function drawLineChart(canvas, labels, values, color){
      const ctx = clearCanvas(canvas);
      const W = canvas.width, H = canvas.height, pad = 40;
      const maxV = Math.max(10, ...values);
      ctx.strokeStyle = "rgba(7,22,42,.18)";
      ctx.beginPath(); ctx.moveTo(pad,pad); ctx.lineTo(pad,H-pad); ctx.lineTo(W-pad,H-pad); ctx.stroke();

      if (!labels.length) return;
      const xStep = (W-2*pad) / Math.max(1, labels.length-1);

      ctx.strokeStyle = color; ctx.lineWidth = 3;
      ctx.beginPath();
      labels.forEach((lab,i)=>{
        const x = pad + xStep*i;
        const y = (H-pad) - (H-2*pad) * ((values[i])/(maxV));
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.stroke();
    }
    function drawPieChart(canvas, entries){
      const ctx = clearCanvas(canvas);
      const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=Math.min(W,H)*0.32;
      const total = entries.reduce((s,e)=>s+e.value,0) || 1;
      let a = -Math.PI/2;
      const colors=["#C8A24A","#0B1F3B","#2CA768","#7B5F2A","#7D3C98","#1F77B4","#D35400","#2E4053"];
      entries.forEach((e,i)=>{
        const slice = (e.value/total)*Math.PI*2;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a,a+slice); ctx.closePath();
        ctx.fillStyle = colors[i%colors.length]; ctx.fill();
        a += slice;
      });
    }
    function drawBarChart(canvas, entries, color){
      const ctx = clearCanvas(canvas);
      const W=canvas.width,H=canvas.height,pad=40;
      const maxV = Math.max(1, ...entries.map(e=>e.value));
      ctx.strokeStyle = "rgba(7,22,42,.18)";
      ctx.beginPath(); ctx.moveTo(pad,pad); ctx.lineTo(pad,H-pad); ctx.lineTo(W-pad,H-pad); ctx.stroke();

      const slot = (W-2*pad)/Math.max(1,entries.length);
      const barW = slot*0.6;
      entries.forEach((e,i)=>{
        const x = pad + i*slot + slot*0.2;
        const h = (H-2*pad)*(e.value/maxV);
        const y = (H-pad)-h;
        ctx.fillStyle = color;
        ctx.fillRect(x,y,barW,h);
      });
    }

    async function renderStats(items){
      const from = $("statsFrom").value ? new Date($("statsFrom").value) : null;
      const to = $("statsTo").value ? new Date($("statsTo").value) : null;
      const mode = $("statsTimeMode").value;

      const filtered = items.filter(it=>{
        const d = new Date(dateKeyForItem(it));
        if (from && d < from) return false;
        if (to && d > to) return false;
        return true;
      });

      // line
      const map = new Map();
      filtered.forEach(it=>{
        const k = dateKeyForItem(it);
        const mins = (mode==="reel") ? parseTimeToMinutes(it.tempsReel) : parseTimeToMinutes(it.tempsEstime);
        map.set(k,(map.get(k)||0)+mins);
      });
      const labels = Array.from(map.keys()).sort();
      const values = labels.map(k=>map.get(k));
      drawLineChart($("lineChart"), labels, values, "rgba(200,162,74,.95)");

      // pie by famille
      const fam = new Map();
      filtered.forEach(it=>{
        const k = it.famille || "(Sans famille)";
        fam.set(k,(fam.get(k)||0)+1);
      });
      const famEntries = Array.from(fam.entries()).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,8);
      drawPieChart($("pieChart"), famEntries);

      // bar by statut
      const st = new Map([["A faire",0],["En cours",0],["Terminé",0]]);
      filtered.forEach(it=> st.set(it.statut,(st.get(it.statut)||0)+1));
      const stEntries = Array.from(st.entries()).map(([label,value])=>({label,value}));
      drawBarChart($("barChart"), stEntries, "rgba(11,31,59,.85)");
    }

    // ===== INIT =====
    document.addEventListener("DOMContentLoaded", async () => {
      db = await openDb();

      fillSelect("famille", FAMILLES, FAMILLES[0]);
      fillSelect("categorie", CATEGORIES, "Moi-même");
      fillSelect("statut", STATUTS, "A faire");

      $("tab-todo").addEventListener("click", async () => { switchTab("todo"); await render(); });
      $("tab-archive").addEventListener("click", async () => { switchTab("archive"); await render(); });
      $("tab-stats").addEventListener("click", async () => { switchTab("stats"); await render(); });

      // Meeting banner
      $("meetingToggle").addEventListener("change", (e) => { if (e.target.checked) openMeetingModal(); });
      $("meetingQuick").addEventListener("click", () => { $("meetingToggle").checked = true; openMeetingModal(); });

      $("closeMeeting").addEventListener("click", closeMeetingModal);
      $("meetingCancel").addEventListener("click", closeMeetingModal);
      $("meetingModal").addEventListener("click", (ev)=>{ if(ev.target===$("meetingModal")) closeMeetingModal(); });

      $("meeting-form").addEventListener("submit", async (e)=>{
        e.preventDefault();
        await createMeetingTask();
        closeMeetingModal();
        switchTab("todo");
        await render();
      });

      // Add task
      $("add-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const statut = $("statut").value;
        const item = {
          createdAt: Date.now(),
          actionPrecise: $("actionPrecise").value.trim(),
          famille: $("famille").value,
          categorie: $("categorie").value,
          nom: $("nom").value.trim(),
          tempsEstime: $("tempsEstime").value,
          tempsReel: $("tempsReel").value,
          dateLimite: $("dateLimite").value,
          statut,
          archivedAt: (statut === "Terminé") ? Date.now() : null,
          isMeeting: false,
          meeting: null
        };
        await addItem(db, item);
        e.target.reset();
        fillSelect("statut", STATUTS, "A faire");
        fillSelect("categorie", CATEGORIES, "Moi-même");
        await render();
      });

      $("reset-btn").addEventListener("click", () => $("add-form").reset());

      // CSV
      $("export-btn").addEventListener("click", async ()=> exportCSV(await getAll(db)));
      $("import-btn").addEventListener("click", ()=> $("import-file").click());
      $("import-file").addEventListener("change", async (e)=>{
        const file = e.target.files?.[0];
        if(!file) return;
        await importCSV(file);
        e.target.value="";
        await render();
      });

      // stats refresh
      $("statsRefresh").addEventListener("click", async ()=> renderStats(await getAll(db)));

      await render();
    });
  </script>
</body>
</html>
