<script>
/* ======================================================
   UTILITAIRES
====================================================== */
const $ = id => document.getElementById(id);
function b64(str){
  return btoa(unescape(encodeURIComponent(str)));
}

/* ======================================================
   IDENTIFICATION APPAREIL
====================================================== */
function getDeviceId(){
  const ua = navigator.userAgent.toLowerCase();
  if(ua.includes("iphone")) return "iphone";
  if(ua.includes("ipad")) return "ipad";
  return "autre";
}
const DEVICE_ID = getDeviceId();

/* ======================================================
   INDEXED DB (IDENTIQUE)
====================================================== */
const DB_NAME="todo_local_db";
const DB_VERSION=13;
const STORE="items";
let db=null;

/* openDb, addItem, putItem, getAll, del : IDENTIQUES */

/* ======================================================
   NUAGE — PROTOCOLE FINAL À 2 FICHIERS (PROPRE)
====================================================== */

const NC_SHARE_TOKEN = "EbxSNijiQN5zxtj";

// Fichiers lus
const NC_READ_FILES = [
  "todo-iphone.json",
  "todo-ipad.json"
];

// Fichier écrit par CET appareil
const NC_WRITE_FILE = `todo-${DEVICE_ID}.json`;

function ncUrls(file){
  return [
    `https://nuage03.apps.education.fr/public.php/dav/files/${NC_SHARE_TOKEN}/${file}`,
    `https://nuage03.apps.education.fr/index.php/public.php/dav/files/${NC_SHARE_TOKEN}/${file}`
  ];
}

function getCloudPass(){ return localStorage.getItem("todo_nc_pass")||""; }
function setCloudPass(p){ localStorage.setItem("todo_nc_pass",p||""); }
function setCloudStatus(t){ $("cloudStatus").textContent=t; }

/* ===== POPUP NUAGE (RESTAURÉE) ===== */
function openCloud(){
  $("cloudOverlay").classList.add("open");
  $("cloudOverlay").setAttribute("aria-hidden","false");
  $("cloudPass").value = getCloudPass();
  setCloudStatus("");
}
function closeCloud(){
  $("cloudOverlay").classList.remove("open");
  $("cloudOverlay").setAttribute("aria-hidden","true");
}

/* ===== LECTURE DES 2 FICHIERS ===== */
async function ncLoadTasks(){
  const pass=getCloudPass();
  if(!pass) return [];
  setCloudStatus("Lecture du nuage…");

  let all=[];
  for(const file of NC_READ_FILES){
    for(const url of ncUrls(file)){
      try{
        const r=await fetch(url,{
          headers:{ Authorization:"Basic "+b64("anonymous:"+pass) }
        });
        if(!r.ok) continue;
        const data=await r.json();
        if(Array.isArray(data)) all=all.concat(data);
        break;
      }catch(e){}
    }
  }
  setCloudStatus(`Nuage OK (${all.length} éléments)`);
  return all;
}

/* ===== ÉCRITURE : 1 FICHIER ===== */
async function ncSaveTasks(tasks){
  const pass=getCloudPass();
  if(!pass) return;
  setCloudStatus(`Sauvegarde ${NC_WRITE_FILE}…`);

  for(const url of ncUrls(NC_WRITE_FILE)){
    try{
      const r=await fetch(url,{
        method:"PUT",
        headers:{
          Authorization:"Basic "+b64("anonymous:"+pass),
          "Content-Type":"application/json"
        },
        body:JSON.stringify(tasks,null,2)
      });
      if(r.ok){
        setCloudStatus("✅ Nuage synchronisé");
        return;
      }
    }catch(e){}
  }
  setCloudStatus("❌ Sauvegarde impossible");
}

/* ===== FUSION & SYNCHRO ===== */
function mergeByUID(localItems, cloudItems){
  const map=new Map();
  [...localItems,...cloudItems].forEach(it=>{
    if(!it.uid) return;
    const prev=map.get(it.uid);
    if(!prev || (it.updatedAt||0) >= (prev.updatedAt||0)){
      map.set(it.uid,it);
    }
  });
  return [...map.values()];
}

async function syncMergeWithCloud(){
  const cloud=await ncLoadTasks();
  let local=await getAll();

  local.forEach(it=>{
    if(!it.device) it.device=DEVICE_ID;
  });

  const merged=mergeByUID(local,cloud);
  for(const it of merged) await putItem(it);

  await ncSaveTasks(
    merged.filter(it=>it.device===DEVICE_ID)
  );
}

/* ===== LE RESTE DU SCRIPT ARRIVE DANS MESSAGE 2 ===== */
</script>

  });

  // ===== RÉUNION =====

  });
  $("closeMeeting").addEventListener("click", closeMeeting);

  $("meetingOverlay").addEventListener("click",(e)=>{
    if(e.target === $("meetingOverlay")) closeMeeting();
  });

  $("meeting-form").addEventListener("submit", async(e)=>{
    e.preventDefault();
    const now = Date.now();
    const meeting={
      date:$("m_date").value,
      time:$("m_time").value,
      place:$("m_place").value.trim(),
      people:$("m_people").value.trim(),
      needs:$("m_needs").value.trim(),
      minutes:$("m_minutes").value.trim()
    };
    const label=`Réunion ${meeting.date||""} ${meeting.time||""}`.trim();

    await addItem({
      uid: makeUID(),
      device: DEVICE_ID,
      updatedAt: now,
      createdAt: now,
      actionPrecise: label || "Réunion",
      famille: "Réunion",
      categorie: "Moi-même",
      nom: meeting.people || "",
      tempsEstime: "",
      tempsReel: "",
      dateLimite: meeting.date || "",
      statut: "A faire",
      archivedAt: null,
      isMeeting: true,
      meeting
    });

    scheduleCloudSave();
    closeMeeting();
    switchTab("todo");
    await render();
  });

  // ===== AJOUT NORMAL =====
  $("add-form").addEventListener("submit", async(e)=>{
    e.preventDefault();
    const statut=$("statut").value;
    const now = Date.now();

    await addItem({
      uid: makeUID(),
      device: DEVICE_ID,
      updatedAt: now,
      createdAt: now,
      actionPrecise:$("actionPrecise").value.trim(),
      famille:$("famille").value,
      categorie:$("categorie").value,
      nom:$("nom").value.trim(),
      tempsEstime:$("tempsEstime").value,
      tempsReel:$("tempsReel").value,
      dateLimite:$("dateLimite").value,
      statut,
      archivedAt: statut==="Terminé" ? now : null,
      isMeeting:false,
      meeting:null
    });

    scheduleCloudSave();
    $("add-form").reset();
    fillSelect("statut",STATUTS,"A faire");
    fillSelect("categorie",CATEGORIES,"Moi-même");
    $("meetingToggle").checked=false;
    await render();
  });

  // CSV
  $("export-btn").addEventListener("click", exportCSV);
  $("import-btn").addEventListener("click", ()=> $("import-file").click());
  $("import-file").addEventListener("change", async(e)=>{
    const file=e.target.files?.[0];
    if(!file) return;
    await importCSV(file);
    e.target.value="";
    await render();
  });

  // ===== SYNCHRO AUTO AU DÉMARRAGE =====
  await syncMergeWithCloud();
  await render();
});
</script>

<!-- ======================================================
     AUTO‑UPDATE ANTI‑CACHE
====================================================== -->
<script>
(function(){
  const build = document.querySelector('meta[name="app-build"]')?.content || "0";
  const key = "todoupdated:" + build;

  if (sessionStorage.getItem(key)) {
    if (location.search.includes("v="))
      history.replaceState(null, "", location.pathname);
    return;
  }

  const bustUrl = location.pathname.replace(/\/?$/, "/")
    + "index.html?__=" + Date.now();

  fetch(bustUrl, { cache: "no-store" })
    .then(r => r.text())
    .then(html => {
      const m = html.match(
        /<meta\s+name=[^"']+["']/i
      );
      const remoteBuild = m ? m[1] : build;

      sessionStorage.setItem(key, "1");
      if (remoteBuild !== build) {
        location.replace(location.pathname + "?v=" + Date.now());
      } else {
        if (location.search.includes("v="))
          history.replaceState(null, "", location.pathname);
      }
    })
    .catch(() => {
      if (location.search.includes("v="))
        history.replaceState(null, "", location.pathname);
    });
})();
</script>
